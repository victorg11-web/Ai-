<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VT Shoppen</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#0f172a,#020617); color: #fff; }
    header { padding: 20px; text-align: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
    header h1 { color: #38bdf8; }
    nav { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    nav a { color: #fff; text-decoration: none; }
    .container { padding: 40px; max-width: 1100px; margin: auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(15px); transition: 0.3s; }
    .card:hover { transform: scale(1.05); }
    .card h2 { color: #38bdf8; }
    button { background: #38bdf8; border: none; padding: 10px; border-radius: 10px; cursor: pointer; }
    .login-box { max-width: 300px; margin: 30px auto; }
    input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px; border: none; }
  </style>
</head>
<body>

<header>
  <h1>VT Shoppen</h1>
  <nav>
    <a href="#">Shop</a>
    <a href="#login">Login</a>
  </nav>
</header>

<div class="container">

  <div class="login-box" id="login">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Brugernavn">
    <input type="password" id="password" placeholder="Kodeord">
    <button onclick="login()">Login</button>
  </div>

  <h2>Twitch Followers</h2>
  <div class="grid">
    <div class="card"><h2>1.000</h2><p>7 DKK</p><button onclick="buy('twitch1000',7)">Køb</button></div>
    <div class="card"><h2>2.000</h2><p>14 DKK</p><button onclick="buy('twitch2000',14)">Køb</button></div>
    <div class="card"><h2>3.000</h2><p>21 DKK</p><button onclick="buy('twitch3000',21)">Køb</button></div>
  </div>

  <h2 style="margin-top:40px;">Roblox Followers</h2>
  <div class="grid">
    <div class="card"><h2>1.000</h2><p>14 DKK</p><button onclick="buy('roblox1000',14)">Køb</button></div>
    <div class="card"><h2>2.000</h2><p>28 DKK</p><button onclick="buy('roblox2000',28)">Køb</button></div>
  </div>

</div>

<script>
  function login() {
    const user = document.getElementById('username').value;
    localStorage.setItem('user', user);
    alert('Logget ind som ' + user);
  }

  async function buy(product, price) {
    const res = await fetch('https://din-backend-url.com/create-checkout-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product, price })
    });

    const data = await res.json();
    const stripe = Stripe('DIN_PUBLIC_KEY');
    stripe.redirectToCheckout({ sessionId: data.id });
  }
</script>

</body>
</html>
