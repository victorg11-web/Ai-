<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniTube Modern+</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f19;
  --panel:#121a2a;
  --card:#162033;
  --text:#e8eefc;
  --muted:#93a4c7;
  --accent:#ff3b3b;
  --accent2:#4f7cff;
}
body.light{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --card:#f0f3f9;
  --text:#0b1220;
  --muted:#51607a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,Arial;
  background:var(--bg);
  color:var(--text);
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 18px;
  background:var(--panel);
  position:sticky;
  top:0;
  z-index:10;
}
.logo{font-weight:800;color:var(--accent)}
.search{width:40%;padding:10px 14px;border-radius:999px;border:none;background:var(--card);color:var(--text)}
.layout{display:flex}
.sidebar{width:220px;background:var(--panel);padding:14px;min-height:100vh}
.sidebar p{color:var(--muted);cursor:pointer;padding:10px;border-radius:10px}
.sidebar p:hover{background:var(--card);color:var(--text)}
.main{flex:1;padding:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:translateY(-4px)}
.thumb{height:140px;background:linear-gradient(135deg,#2b3a6b,#1a2340)}
.card-content{padding:10px}
.title{font-weight:600;margin:0}
.small{font-size:12px;color:var(--muted)}
.admin{margin:14px;padding:14px;background:var(--panel);border-radius:16px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px}
.admin input{padding:10px;border-radius:10px;border:none;background:var(--card);color:var(--text)}
.admin button{border:none;border-radius:10px;background:var(--accent2);color:white;cursor:pointer}
.player{display:none;padding:20px}
iframe{width:100%;height:420px;border-radius:14px;border:none}
.meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.likebtn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;background:var(--card)}
.profile{display:flex;gap:10px;align-items:center}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(45deg,#ff3b3b,#4f7cff)}
.commentBox{margin-top:12px;background:var(--card);padding:10px;border-radius:12px}
.comment{margin-left:10px;padding-left:10px;border-left:2px solid var(--accent2)}
.trendingBadge{font-size:11px;background:var(--accent);padding:2px 6px;border-radius:6px;margin-left:6px}
</style>
</head>
<body>

<header>
<div class="logo">MiniTube+</div>
<input class="search" placeholder="Søg..." oninput="search(this.value)" />
<button onclick="toggleTheme()">🌙</button>
</header>

<div class="admin">
<input id="title" placeholder="Titel" />
<input id="link" placeholder="YouTube link" />
<input id="channel" placeholder="Bruger" />
<button onclick="upload()">Upload</button>
</div>

<div class="layout">
<div class="sidebar">
<p onclick="render(videos)">🏠 Home</p>
<p onclick="showTrending()">📊 Trending</p>
</div>
<div class="main">
<div id="grid" class="grid"></div>
</div>
</div>

<div id="player" class="player">
<button onclick="back()">⬅ Tilbage</button>
<iframe id="frame"></iframe>
<div class="meta">
<div class="profile">
<div class="avatar"></div>
<div>
<h3 id="ptitle"></h3>
<div class="small" id="pchannel"></div>
</div>
</div>
<button class="likebtn" onclick="like()">👍 <span id="likes">0</span></button>
</div>

<div class="commentBox">
<h4>💬 Comments</h4>
<input id="cinput" placeholder="Skriv kommentar" />
<button onclick="addComment()">Send</button>
<div id="comments"></div>
</div>
</div>

<script>
let videos=JSON.parse(localStorage.getItem("videos")||"[]");
if(videos.length===0){
videos=[
{id:"dQw4w9WgXcQ",title:"Gaming Highlights",channel:"Alex",likes:12,comments:[],views:120},
{id:"5qap5aO4i9A",title:"LoFi Music",channel:"Mia",likes:8,comments:[],views:300}
];}

let current=null;
let user=prompt("Brugernavn?")||"Guest";

function save(){localStorage.setItem("videos",JSON.stringify(videos));}

function extractID(url){
if(url.includes("youtu.be/"))return url.split("youtu.be/")[1].split("?")[0];
if(url.includes("v="))return url.split("v=")[1].split("&")[0];
return "";
}

function render(list=videos){
list=list.sort((a,b)=>b.views-a.views);

document.getElementById("grid").innerHTML=list.map(v=>`
<div class="card" onclick="openV('${v.id}')">
<div class="thumb"></div>
<div class="card-content">
<p class="title">${v.title}${v.views>200?'<span class=\"trendingBadge\">TRENDING</span>':''}</p>
<div class="small">👤 ${v.channel}</div>
</div>
</div>`).join("");
}

function openV(id){
current=videos.find(v=>v.id===id);
current.views++;
save();

document.querySelector(".layout").style.display="none";
document.querySelector(".admin").style.display="none";
document.getElementById("player").style.display="block";

frame.src="https://www.youtube.com/embed/"+id;
ptitle.innerText=current.title;
pchannel.innerText="👤 "+current.channel;
likes.innerText=current.likes;
renderComments();
}

function back(){
document.querySelector(".layout").style.display="flex";
document.querySelector(".admin").style.display="grid";
document.getElementById("player").style.display="none";
}

function like(){current.likes++;save();likes.innerText=current.likes;}

function addComment(){
let text=cinput.value;
if(!text)return;
current.comments.push({user,text,replies:[]});
cinput.value="";
save();renderComments();
}

function reply(i){
let r=prompt("Reply:");
if(!r)return;
current.comments[i].replies.push({user,text:r});
save();renderComments();
}

function renderComments(){
comments.innerHTML=current.comments.map((c,i)=>`
<div class='comment'>
<b>${c.user}</b>: ${c.text}
<button onclick="reply(${i})">reply</button>
<div style='margin-left:10px'>
${c.replies.map(r=>`↳ <b>${r.user}</b>: ${r.text}`).join("<br>")}
</div>
</div>`).join("<br>");
}

function upload(){
let t=title.value,l=link.value,c=channel.value;
if(!t||!l||!c)return;
let id=extractID(l);
if(!id)return alert("Bad link");
videos.unshift({title:t,id,channel:c,likes:0,comments:[],views:0});
save();render();
}

function search(q){render(videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())));}
function showTrending(){render([...videos].sort((a,b)=>b.views-a.views));}
function toggleTheme(){document.body.classList.toggle("light");}

render();
</script>
</body>
</html>
