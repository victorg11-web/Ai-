<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat + Levels + Tags</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

.menu button{
  background:#1f2937;
  border:none;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
.container{padding:20px;}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* CHAT */
#chatBox{
  height:250px;
  overflow:auto;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:6px;
  margin:5px 0;
  background:#111827;
  border-radius:8px;
}

/* INPUT */
input,select{
  width:80%;
  padding:10px;
  border:none;
  border-radius:8px;
}

button.send{
  width:18%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

/* TAG */
.tag{
  font-size:11px;
  padding:2px 6px;
  border-radius:6px;
  background:#4f46e5;
  margin-left:5px;
}

/* LEVEL BAR */
.bar{
  height:10px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:#22c55e;
  width:0%;
}
</style>
</head>

<body>

<header>
  <div>Social Chat</div>

  <div class="menu">
    <button onclick="show('chat')">Chat</button>
    <button onclick="show('profile')">Profil</button>
  </div>
</header>

<div class="container">

<!-- CHAT -->
<div id="chatPage">

  <div class="card">
    <h3>Chat</h3>

    <div id="chatBox"></div>

    <br>

    <input id="msg" placeholder="Skriv besked">
    <button class="send" onclick="sendMsg()">Send</button>
  </div>

</div>

<!-- PROFILE -->
<div id="profilePage" style="display:none">

  <div class="card">
    <h3>Profil</h3>

    <p>Navn: <b id="pName"></b></p>
    <p>Level: <b id="pLevel"></b></p>
    <p>XP: <b id="pXP"></b></p>

    <div class="bar">
      <div class="fill" id="barFill"></div>
    </div>

    <p>Aktuel Tag: <span class="tag" id="pTag"></span></p>
  </div>

  <div class="card">
    <h3>Vælg Tag</h3>

    <select id="tagSelect">
      <option value="Noob">Noob (0 lvl)</option>
      <option value="Rookie">Rookie (lvl 2)</option>
      <option value="Pro">Pro (lvl 4)</option>
      <option value="Elite">Elite (lvl 6)</option>
    </select>

    <button class="send" onclick="setTag()">Gem</button>
  </div>

</div>

</div>

<script>

/* ===== USER ===== */
let user = {
  name: prompt("Username?") || "Guest",
  xp: 0,
  level: 1,
  tag: "Noob"
};

let chat = [];

/* LEVEL SYSTEM */
function calcLevel(xp){
  return Math.floor(xp / 100) + 1;
}

/* TAG UNLOCKS */
function canUseTag(tag, level){

  if(tag==="Rookie" && level<2) return false;
  if(tag==="Pro" && level<4) return false;
  if(tag==="Elite" && level<6) return false;

  return true;
}

/* SEND MSG */
function sendMsg(){

  if(!msg.value) return;

  user.xp += 10;
  user.level = calcLevel(user.xp);

  chat.push({
    name:user.name,
    text:msg.value,
    tag:user.tag
  });

  msg.value="";
  render();
}

/* SET TAG */
function setTag(){

  let t = tagSelect.value;

  if(!canUseTag(t,user.level)){
    alert("Tag locked! Level up først");
    return;
  }

  user.tag = t;
  render();
}

/* RENDER CHAT */
function render(){

  chatBox.innerHTML="";

  chat.forEach(m=>{
    chatBox.innerHTML += `
      <div class="msg">
        <b>${m.name}</b>
        <span class="tag">${m.tag}</span><br>
        ${m.text}
      </div>
    `;
  });

  updateProfile();
}

/* PROFILE */
function updateProfile(){

  pName.innerText = user.name;
  pLevel.innerText = user.level;
  pXP.innerText = user.xp;
  pTag.innerText = user.tag;

  barFill.style.width = (user.xp % 100) + "%";
}

/* MENU */
function show(page){

  chatPage.style.display = page==="chat" ? "block" : "none";
  profilePage.style.display = page==="profile" ? "block" : "none";

  updateProfile();
}

render();

</script>

</body>
</html>
