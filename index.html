<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VT Shoppen</title>
  <style>
    :root{
      --bg:#0b0f1a;
      --card:#121a2b;
      --accent:#7c5cff;
      --accent2:#00e5ff;
      --text:#eaf0ff;
      --muted:#a7b0c0;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:system-ui;
    }

    body{
      background: radial-gradient(circle at top, #18233f, var(--bg));
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
    }

    header{
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      background:rgba(11,15,26,0.7);
      backdrop-filter: blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      z-index:10;
    }

    .logo{
      font-size:24px;
      font-weight:800;
    }

    .logo span{color:var(--accent);}

    nav a{
      color:var(--muted);
      text-decoration:none;
      margin-left:20px;
    }

    .btn{
      padding:10px 18px;
      background:linear-gradient(45deg,var(--accent),var(--accent2));
      border:none;
      border-radius:12px;
      color:white;
      cursor:pointer;
    }

    .hero{
      text-align:center;
      padding:80px 20px;
      animation:fadeIn 1s ease;
    }

    .hero h1{font-size:50px;}
    .hero p{color:var(--muted);max-width:600px;margin:10px auto;}

    .shop{
      padding:60px 40px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      perspective:1000px;
    }

    .card{
      background:var(--card);
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      transition:0.5s;
      transform-style:preserve-3d;
    }

    .card:hover{
      transform:rotateY(10deg) rotateX(10deg) scale(1.05);
      border-color:var(--accent);
    }

    .card img{
      width:100%;
      border-radius:12px;
      margin-bottom:10px;
    }

    .price{
      color:var(--accent2);
      font-weight:bold;
      margin-top:10px;
    }

    .buy{
      margin-top:10px;
      width:100%;
    }

    footer{
      text-align:center;
      padding:30px;
      color:var(--muted);
      border-top:1px solid rgba(255,255,255,0.08);
    }

    /* LOGIN MODAL */
    .modal{
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.7);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .login-box{
      background:var(--card);
      padding:30px;
      border-radius:16px;
      width:300px;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:10px;
      border:none;
      outline:none;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">VT <span>Shoppen</span></div>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <button class="btn" onclick="logout()">Logout</button>
  </nav>
</header>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="login-box">
    <h2>Login 🔐</h2>
    <input id="user" placeholder="Brugernavn" />
    <input id="pass" type="password" placeholder="Kodeord" />
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<section class="hero">
  <h1>VT Shoppen</h1>
  <p>Den fedeste Roblox shop med items, upgrades og Robux deals</p>
</section>

<section class="shop" id="shop">

  <div class="card">
    <img src="https://tr.rbxcdn.com/placeholder.png" />
    <h3>🔥 Fire Sword</h3>
    <p>Ultra damage weapon</p>
    <div class="price">99 Robux</div>
    <button class="btn buy">Køb</button>
  </div>

  <div class="card">
    <img src="https://tr.rbxcdn.com/placeholder.png" />
    <h3>⚡ Speed Boost</h3>
    <p>Run super fast</p>
    <div class="price">49 Robux</div>
    <button class="btn buy">Køb</button>
  </div>

  <div class="card">
    <img src="https://tr.rbxcdn.com/placeholder.png" />
    <h3>🛡️ Shield Pack</h3>
    <p>Extra protection</p>
    <div class="price">149 Robux</div>
    <button class="btn buy">Køb</button>
  </div>

</section>

<footer>
  © 2026 VT Shoppen
</footer>

<script>
  function login(){
    let u = document.getElementById('user').value;
    let p = document.getElementById('pass').value;

    if(u && p){
      localStorage.setItem('vt_user',u);
      document.getElementById('loginModal').style.display='none';
    }
  }

  function logout(){
    localStorage.removeItem('vt_user');
    location.reload();
  }

  window.onload = function(){
    if(localStorage.getItem('vt_user')){
      document.getElementById('loginModal').style.display='none';
    }
  }
</script>

</body>
</html>
