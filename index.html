<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>
body {
  margin: 0;
  background: #343541;
  color: white;
  font-family: Arial;
}

.chat {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

.message {
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
}

.user {
  background: #444654;
}

.ai {
  background: #3c3f4a;
}

.input-box {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #343541;
  padding: 10px;
}

input {
  width: 80%;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #10a37f;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Send en besked..." />
  <button onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("AI skriver...", "ai");

  const res = await fetch("DIN_BACKEND_URL/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  chat.lastChild.remove(); // fjerner "AI skriver..."
  addMessage(data.reply, "ai");
}
</script>

</body>
</html>
