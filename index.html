<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Tags System</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

.menu button{
  background:#1f2937;
  border:none;
  color:white;
  padding:8px 10px;
  border-radius:8px;
  cursor:pointer;
}

/* LAYOUT */
.container{padding:20px;}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

/* CHAT */
#chatBox{
  height:250px;
  overflow:auto;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:6px;
  margin:5px 0;
  background:#111827;
  border-radius:8px;
}

/* INPUT */
input{
  width:80%;
  padding:10px;
  border:none;
  border-radius:8px;
}

button.send{
  width:18%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

/* TAGS */
.tag{
  font-size:11px;
  padding:2px 6px;
  border-radius:6px;
  background:#4f46e5;
  margin-left:5px;
}
</style>
</head>

<body>

<header>
  <div>Chat System</div>

  <div class="menu">
    <button onclick="showMenu('chat')">Chat</button>
    <button onclick="showMenu('profile')">Menu</button>
  </div>
</header>

<div class="container">

<!-- CHAT -->
<div id="chatPage">

  <div class="card">
    <h3>Global Chat</h3>

    <div id="chatBox"></div>

    <br>

    <input id="msg" placeholder="Skriv besked">
    <button class="send" onclick="sendMsg()">Send</button>
  </div>

</div>

<!-- MENU -->
<div id="profilePage" style="display:none">

  <div class="card">
    <h3>Profil</h3>

    <p>Username: <b id="name"></b></p>
    <p>Messages: <b id="count"></b></p>
    <p>Tag: <span class="tag" id="tag"></span></p>
  </div>

</div>

</div>

<script>

/* ===== USER STATE ===== */
let user = {
  name: "Guest",
  messages: 0
};

let chat = [];

/* INIT USER */
user.name = prompt("Skriv username") || "Guest";

/* TAG SYSTEM */
function getTag(count){

  if(count < 100) return "Noob";
  if(count < 200) return "Rookie";
  if(count < 400) return "Pro";
  return "Elite";
}

/* SEND MESSAGE */
function sendMsg(){

  if(!msg.value) return;

  user.messages++;

  chat.push({
    name: user.name,
    text: msg.value,
    tag: getTag(user.messages)
  });

  msg.value="";
  render();
}

/* RENDER CHAT */
function render(){

  chatBox.innerHTML="";

  chat.forEach(m=>{
    chatBox.innerHTML += `
      <div class="msg">
        <b>${m.name}</b>
        <span class="tag">${m.tag}</span><br>
        ${m.text}
      </div>
    `;
  });

  updateProfile();
}

/* PROFILE UPDATE */
function updateProfile(){

  name.innerText = user.name;
  count.innerText = user.messages;
  tag.innerText = getTag(user.messages);
}

/* MENU */
function showMenu(page){

  chatPage.style.display = page==="chat" ? "block" : "none";
  profilePage.style.display = page==="profile" ? "block" : "none";

  updateProfile();
}

render();

</script>

</body>
</html>
