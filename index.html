<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clicker PRO + Leaderboard</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#020617;
      color:white;
      text-align:center;
    }

    .container{max-width:1000px;margin:auto;padding:20px;}

    #score{font-size:3rem;}

    #clickBtn{
      padding:20px 40px;
      font-size:1.5rem;
      border:none;
      border-radius:15px;
      cursor:pointer;
      background:var(--main,#22c55e);
      transition:0.1s;
    }

    #clickBtn:active{transform:scale(0.9);}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}

    .panel{background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;}

    .btn{padding:6px 10px;border:none;border-radius:8px;cursor:pointer;}

    .shop-item{margin:5px 0;}

    .float{position:absolute;color:#22c55e;animation:up 1s forwards;}

    @keyframes up{0%{opacity:1;}100%{opacity:0;transform:translateY(-80px);}}

  </style>
</head>
<body>

<div class="container">

<h1>🔥 CLICKER ULTIMATE 🔥</h1>
<div id="level">Level 1</div>
<div id="score">0</div>
<button id="clickBtn">CLICK</button>

<div class="grid">

<div class="panel">
<h3>Shop 🛒</h3>
<button class="btn" onclick="buyPower()">+Power (10)</button>
<button class="btn" onclick="buyAuto()">Auto (25)</button>
</div>

<div class="panel">
<h3>Skins 🎨</h3>
<button class="btn" onclick="setSkin('#22c55e')">Green</button>
<button class="btn" onclick="setSkin('#3b82f6')">Blue</button>
<button class="btn" onclick="setSkin('#ef4444')">Red</button>
</div>

<div class="panel">
<h3>Achievements 🏆</h3>
<div id="ach"></div>
</div>

<div class="panel">
<h3>Leaderboard 🌍</h3>
<div id="board"></div>
<button class="btn" onclick="submitScore()">Submit Score</button>
</div>

</div>

</div>

<script>
let score=0,clickPower=1,auto=0,skin="#22c55e";
let achievements=[];
let leaderboard=[];

const scoreEl=document.getElementById("score");
const board=document.getElementById("board");

function level(){return Math.floor(score/100)+1;}

function update(){
  scoreEl.innerText=Math.floor(score);
  document.documentElement.style.setProperty('--main',skin);
  renderBoard();
  renderAch();
}

function add(v){score+=v;update();}

document.getElementById("clickBtn").onclick=()=>add(clickPower);

function buyPower(){if(score>=10){score-=10;clickPower++;update();}}
function buyAuto(){if(score>=25){score-=25;auto++;update();}}

setInterval(()=>add(auto),1000);

// skins
function setSkin(c){skin=c;update();}

// achievements
function renderAch(){
  if(score>100&&!achievements.includes("100")) achievements.push("100 points");
  if(score>1000&&!achievements.includes("1K")) achievements.push("1K points");
  document.getElementById("ach").innerHTML=achievements.map(a=>"<div>"+a+"</div>").join("");
}

// leaderboard (fake global + local merge)
function loadBoard(){
  let local=JSON.parse(localStorage.getItem("lb")||"[]");
  let fake=[
    {name:"ProPlayer",score:5000},
    {name:"NoobMaster",score:3200},
    {name:"ClickGod",score:8000}
  ];
  leaderboard=[...local,...fake].sort((a,b)=>b.score-a.score).slice(0,10);
}

function renderBoard(){
  loadBoard();
  board.innerHTML=leaderboard.map(p=>`<div>${p.name}: ${p.score}</div>`).join("");
}

function submitScore(){
  let name=prompt("Name?")||"Player";
  let lb=JSON.parse(localStorage.getItem("lb")||"[]");
  lb.push({name,score:Math.floor(score)});
  localStorage.setItem("lb",JSON.stringify(lb));
  alert("Submitted!");
  renderBoard();
}

// save
setInterval(()=>localStorage.setItem("save",JSON.stringify({score,clickPower,auto,skin})),3000);

function load(){
  let d=JSON.parse(localStorage.getItem("save"));
  if(d){score=d.score;clickPower=d.clickPower;auto=d.auto;skin=d.skin;}
  update();
}

load();update();
</script>

</body>
</html>
