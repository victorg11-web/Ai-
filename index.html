<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile App FIX</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
}

.container{padding:20px;}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:#2563eb;color:white;}

.hidden{display:none;}

.tag{
  background:#4f46e5;
  padding:2px 6px;
  border-radius:6px;
  font-size:11px;
}

.levelBar{
  height:10px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.levelFill{
  height:100%;
  background:#22c55e;
  width:0%;
}
</style>
</head>

<body>

<header>
  <div>Profile App</div>
  <div>
    <span id="topName">Guest</span>
    Lv <span id="topLevel">0</span>
  </div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
  <div class="card">
    <h3>Login</h3>

    <input id="username" placeholder="Username">
    <input id="avatar" placeholder="Avatar 🙂">

    <button class="primary" onclick="login()">Enter</button>
  </div>
</div>

<!-- PROFILE -->
<div id="app" class="hidden">

  <div class="card">
    <h3>Profil</h3>

    <p>Navn: <span id="pName"></span></p>
    <p>Avatar: <span id="pAvatar"></span></p>
    <p>Tag: <span id="pTag"></span></p>

    <div class="levelBar">
      <div class="levelFill" id="levelFill"></div>
    </div>

    <p>Level: <span id="pLevel"></span></p>
  </div>

  <div class="card">
    <h3>Chat</h3>

    <div id="chatBox" style="height:200px; overflow:auto; background:#1f2937; padding:10px; border-radius:10px;"></div>

    <input id="msg" placeholder="Skriv besked">
    <button class="primary" onclick="sendMsg()">Send</button>
  </div>

</div>

</div>

<script>

/* ===== STATE ===== */
let profile = null;

/* LOGIN FIX */
function login(){

  if(!username.value){
    alert("Skriv username");
    return;
  }

  profile = {
    name: username.value,
    avatar: avatar.value || "🙂",
    level: 1,
    xp: 0,
    tag: "user",
    messages: []
  };

  startApp();
}

/* ENTER KEY FIX */
document.addEventListener("keydown", (e)=>{
  if(e.key === "Enter" && loginScreen.style.display !== "none"){
    login();
  }
});

/* START APP */
function startApp(){

  loginScreen.classList.add("hidden");
  app.classList.remove("hidden");

  render();
}

/* SEND MSG */
function sendMsg(){

  if(!msg.value) return;

  profile.messages.push({
    text: msg.value
  });

  profile.xp += 10;
  profile.level = Math.floor(profile.xp / 100) + 1;

  msg.value="";
  render();
}

/* RENDER UI */
function render(){

  pName.innerText = profile.name;
  pAvatar.innerText = profile.avatar;
  pTag.innerHTML = `<span class="tag">${profile.tag}</span>`;
  pLevel.innerText = profile.level;

  topName.innerText = profile.name;
  topLevel.innerText = profile.level;

  levelFill.style.width = (profile.xp % 100) + "%";

  chatBox.innerHTML = "";

  profile.messages.forEach(m=>{
    chatBox.innerHTML += `<div>${profile.avatar} ${m.text}</div>`;
  });

}

</script>

</body>
</html>
