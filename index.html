<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Ultra AI</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat {
  width: 400px;
  height: 600px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px;
  padding: 10px;
  border-radius: 12px;
}

.user { background: #4f7cff; text-align: right; }
.ai { background: rgba(255,255,255,0.2); }

.input {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat">
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="Skriv eller tal..." />
    <button onclick="voice()">🎤</button>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>

let memory = [];

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
  document.getElementById("messages").scrollTop = 9999;
}

// 🤖 “AI hjerne” (simple rules + smart svar)
function aiBrain(input) {
  input = input.toLowerCase();

  if (input.includes("hej")) return "Hej! 👋";
  if (input.includes("hvad hedder du")) return "Jeg er din lokale AI 🤖";
  if (input.includes("hvordan går det")) return "Jeg har det fint 😄 hvad med dig?";
  if (input.includes("tid")) return "Jeg kan ikke se tiden, men din browser kan ⏰";
  if (input.includes("love")) return "Kærlighed er vigtigt ❤️";
  if (input.includes("hej med dig")) return "Hej med dig også 😎";

  return "Jeg forstår: " + input + " 🤔";
}

// 💬 send besked
function send(textFromVoice) {
  let input = textFromVoice || document.getElementById("input").value;
  if (!input) return;

  addMsg(input, "user");
  memory.push({role:"user", text: input});

  let reply = aiBrain(input);

  setTimeout(() => {
    addMsg(reply, "ai");
    memory.push({role:"ai", text: reply});
    speak(reply);
  }, 500);

  document.getElementById("input").value = "";
}

// 🎤 Voice input
function voice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return alert("Din browser understøtter ikke tale");

  const rec = new SpeechRecognition();
  rec.lang = "da-DK";

  rec.onresult = (e) => {
    send(e.results[0][0].transcript);
  };

  rec.start();
}

// 🔊 Voice output
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "da-DK";
  speechSynthesis.speak(msg);
}

</script>

</body>
</html>
