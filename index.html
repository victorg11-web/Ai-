<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MiniTube Ultimate</title>
<style>
:root{
  --bg:#0f0f0f;
  --card:#1f1f1f;
  --text:white;
}

body.light{
  --bg:#f5f5f5;
  --card:white;
  --text:black;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
}

.logo{color:red;font-weight:bold;font-size:20px;}

.search{width:40%;padding:8px;border-radius:20px;border:none;}

.container{display:flex;}

.sidebar{width:200px;padding:10px;background:#121212;min-height:100vh;}

.video-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:var(--card);
  border-radius:10px;
  padding:10px;
  cursor:pointer;
}

.thumb{height:120px;background:#333;border-radius:8px;}

.player{display:none;padding:10px;}

iframe{width:100%;height:400px;}

.likebar button{margin:5px}

.comment{font-size:12px;opacity:0.8}

.feed{
  display:none;
  height:100vh;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}

.feedVideo{
  height:100vh;
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.feedVideo iframe{height:60vh;width:90%;}

</style>
</head>
<body>

<header>
<div class="logo">▶ MiniTube</div>
<input class="search" placeholder="Search..." oninput="search(this.value)" />
<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleFeed()">📱</button>
</header>

<div class="container">
<div class="sidebar">
<p onclick="filter('all')">Home</p>
<p onclick="filter('gaming')">Gaming</p>
<p onclick="filter('music')">Music</p>
<p onclick="filter('tech')">Tech</p>
</div>

<div id="grid" class="video-grid"></div>
</div>

<div id="feed" class="feed"></div>

<div id="player" class="player">
<button onclick="back()">⬅ Back</button>
<iframe id="frame"></iframe>
<div class="likebar">
<button onclick="like()">👍</button>
<button onclick="dislike()">👎</button>
<span id="likes">0</span>
</div>
<div>
<input id="commentInput" placeholder="Comment" />
<button onclick="addComment()">Send</button>
<div id="comments"></div>
</div>
</div>

<script>

let videos=[
  {id:"dQw4w9WgXcQ",title:"Gaming Highlights",cat:"gaming",likes:0,dislikes:0,comments:[]},
  {id:"M7lc1UVf-VE",title:"Tech Review",cat:"tech",likes:0,dislikes:0,comments:[]},
  {id:"5qap5aO4i9A",title:"Music Chill",cat:"music",likes:0,dislikes:0,comments:[]}
];

let current=null;
let subs=[];

function render(list=videos){
  document.getElementById("grid").innerHTML=list.map(v=>`
    <div class="card" onclick="openVideo('${v.id}')">
      <div class="thumb"></div>
      <b>${v.title}</b>
    </div>
  `).join("");
}

function openVideo(id){
  current=videos.find(v=>v.id===id);
  document.querySelector(".container").style.display="none";
  document.getElementById("player").style.display="block";
  document.getElementById("frame").src="https://www.youtube.com/embed/"+id;
  updateUI();
}

function back(){
  document.querySelector(".container").style.display="flex";
  document.getElementById("player").style.display="none";
}

function like(){current.likes++;updateUI();}
function dislike(){current.dislikes++;updateUI();}

function updateUI(){
  document.getElementById("likes").innerText=current.likes+" 👍 / "+current.dislikes+" 👎";
  document.getElementById("comments").innerHTML=current.comments.map(c=>"💬 "+c).join("<br>");
}

function addComment(){
  let c=document.getElementById("commentInput").value;
  current.comments.push(c);
  updateUI();
}

function search(q){
  render(videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())));
}

function filter(cat){
  if(cat=="all") render();
  else render(videos.filter(v=>v.cat==cat));
}

function toggleTheme(){document.body.classList.toggle("light");}

function toggleFeed(){
  let f=document.getElementById("feed");
  if(f.style.display=="block"){
    f.style.display="none";
    document.querySelector(".container").style.display="flex";
  }else{
    document.querySelector(".container").style.display="none";
    f.style.display="block";
    renderFeed();
  }
}

function renderFeed(){
  document.getElementById("feed").innerHTML=videos.map(v=>`
    <div class="feedVideo">
      <iframe src="https://www.youtube.com/embed/${v.id}"></iframe>
      <b>${v.title}</b>
    </div>
  `).join("");
}

render();

</script>

</body>
</html>
