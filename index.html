<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FortTube</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:#181818;
  position:sticky;
  top:0;
}

.logo{
  font-weight:bold;
  font-size:20px;
  color:red;
}

.search{
  width:40%;
  padding:8px;
  border-radius:20px;
  border:none;
}

.container{
  display:flex;
}

.sidebar{
  width:200px;
  background:#121212;
  height:100vh;
  padding:10px;
}

.video-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1f1f1f;
  border-radius:10px;
  cursor:pointer;
  overflow:hidden;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

.thumb{
  height:140px;
  background:#333;
}

.title{
  padding:10px;
  font-size:14px;
}

.player{
  display:none;
  padding:20px;
}

iframe{
  width:100%;
  height:400px;
  border:none;
}

.back{
  margin-bottom:10px;
  padding:8px 12px;
  border:none;
  background:red;
  color:white;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">▶ MiniTube</div>
  <input class="search" placeholder="Search videos..." oninput="filterVideos(this.value)" />
</header>

<div class="container">

<div class="sidebar">
  <p>🏠 Home</p>
  <p>🔥 Trending</p>
  <p>🎮 Gaming</p>
  <p>🎵 Music</p>
</div>

<div id="grid" class="video-grid"></div>

</div>

<div id="player" class="player">
  <button class="back" onclick="back()">⬅ Back</button>
  <iframe id="frame"></iframe>
</div>

<script>

const videos=[
  {title:"Funny Cats Compilation",id:"J---aiyznGQ"},
  {title:"Gaming Highlights 2026",id:"dQw4w9WgXcQ"},
  {title:"Relaxing Music",id:"5qap5aO4i9A"},
  {title:"Tech Reviews",id:"M7lc1UVf-VE"},
  {title:"Top 10 Moments",id:"e-ORhEE9VVg"}
];

function render(list){
  document.getElementById("grid").innerHTML=list.map(v=>`
    <div class="card" onclick="play('${v.id}')">
      <div class="thumb"></div>
      <div class="title">${v.title}</div>
    </div>
  `).join("");
}

function play(id){
  document.querySelector(".container").style.display="none";
  document.getElementById("player").style.display="block";
  document.getElementById("frame").src="https://www.youtube.com/embed/"+id;
}

function back(){
  document.querySelector(".container").style.display="flex";
  document.getElementById("player").style.display="none";
}

function filterVideos(q){
  render(videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())));
}

render(videos);

</script>

</body>
</html>
