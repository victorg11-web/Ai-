<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultimate Clicker PRO</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle, #0b1020, #020617);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    #score { font-size: 3rem; }
    #level { opacity: 0.8; }

    #clickBtn {
      padding: 25px 50px;
      font-size: 1.5rem;
      border: none;
      border-radius: 20px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: transform 0.1s;
    }

    #clickBtn:active { transform: scale(0.9); }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }

    .skill {
      padding: 8px;
      margin: 5px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .achievement {
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .float {
      position: absolute;
      color: #22c55e;
      animation: floatUp 1s forwards;
    }

    @keyframes floatUp {
      0% {opacity:1; transform: translateY(0);}
      100% {opacity:0; transform: translateY(-80px);}
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      #clickBtn { width: 100%; }
    }

  </style>
</head>
<body>

<div class="container">
  <h1>🔥 Clicker PRO 🔥</h1>
  <div id="level">Level 1</div>
  <div id="score">0</div>
  <button id="clickBtn">CLICK</button>

  <div class="grid">

    <div class="panel">
      <h3>Skill Tree 🌳</h3>
      <div class="skill" onclick="buySkill('power')">+Click Power (10)</div>
      <div class="skill" onclick="buySkill('auto')">Auto Click (25)</div>
      <div class="skill" onclick="buySkill('crit')">Crit Chance (50)</div>
      <div class="skill" onclick="buySkill('combo')">Combo Boost (75)</div>
    </div>

    <div class="panel">
      <h3>Achievements 🏆</h3>
      <div id="ach"></div>
    </div>

    <div class="panel">
      <h3>Music 🎶</h3>
      <button onclick="toggleMusic()">Toggle Music</button>
      <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
      </audio>
    </div>

    <div class="panel">
      <h3>Prestige 🧠</h3>
      <button onclick="prestige()">Reset + x2 bonus</button>
    </div>

  </div>
</div>

<script>
let score=0, clickPower=1, auto=0, mult=1;
let crit=0.05, combo=0, lastClick=Date.now();
let skills={power:0,auto:0,crit:0,combo:0};
let achievements=[];

const scoreEl=document.getElementById("score");
const levelEl=document.getElementById("level");
const music=document.getElementById("music");

function level(){return Math.floor(score/100)+1;}

function update(){
  scoreEl.innerText=Math.floor(score);
  levelEl.innerText="Level "+level();
  renderAch();
}

function floatText(val,x,y){
  let d=document.createElement("div");
  d.className="float";
  d.innerText="+"+val;
  d.style.left=x+"px";
  d.style.top=y+"px";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1000);
}

function add(val,x,y){
  let now=Date.now();
  if(now-lastClick<1500) combo++; else combo=0;
  lastClick=now;

  let gain=val*mult*(1+combo*0.1);

  if(Math.random()<crit){gain*=5;}

  score+=gain;

  if(score>100 && !achievements.includes("100")) achievements.push("100 coins!");
  if(score>1000 && !achievements.includes("1k")) achievements.push("1K legend!");

  update();
  if(x) floatText(gain,x,y);
}

function buySkill(type){
  let cost=type=="power"?10:type=="auto"?25:type=="crit"?50:75;
  if(score>=cost){
    score-=cost;
    skills[type]++;

    if(type=="power") clickPower++;
    if(type=="auto") auto++;
    if(type=="crit") crit+=0.02;
    if(type=="combo") mult+=0.1;

    update();
  }
}

function prestige(){
  if(score>1000){
    score=0;clickPower=1;auto=0;mult*=2;
    skills={power:0,auto:0,crit:0,combo:0};
    alert("Prestige activated!");
  }
}

function renderAch(){
  document.getElementById("ach").innerHTML=achievements.map(a=>"<div class='achievement'>"+a+"</div>").join("");
}

function toggleMusic(){
  if(music.paused) music.play(); else music.pause();
}

document.getElementById("clickBtn").onclick=(e)=>add(clickPower,e.clientX,e.clientY);

setInterval(()=>add(auto,window.innerWidth/2,window.innerHeight/2),1000);

// offline + save (cloud placeholder)
function save(){
  localStorage.setItem("clicker",JSON.stringify({score,clickPower,auto,mult,crit,skills,achievements}));
}

function load(){
  let d=JSON.parse(localStorage.getItem("clicker"));
  if(d){Object.assign(window,d);}
  update();
}

setInterval(save,3000);
load();
update();
</script>

</body>
</html>
