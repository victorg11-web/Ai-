<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#f5f6f8;
  color:#111;
}

/* LOGIN */
#login {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
}

.box {
  background:white;
  padding:20px;
  border-radius:14px;
  width:300px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary { background:#2563eb; color:white; }
.danger { background:#ef4444; color:white; }

/* APP */
.hidden { display:none; }

header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
  background:white;
  border-bottom:1px solid #e5e7eb;
}

.container {
  display:grid;
  grid-template-columns: 240px 1fr;
  min-height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
  background:white;
  border-right:1px solid #e5e7eb;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin-bottom:8px;
  background:#f3f4f6;
  color:#111;
}

/* MAIN */
.main {
  padding:20px;
}

/* CARDS */
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  margin-bottom:10px;
}

/* POSTS */
textarea {
  width:100%;
  height:80px;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  resize:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="login()">Login</button>
    <button onclick="signup()">Opret bruger</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h3>Workspace</h3>
  <button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="view('home')">Home</button>
    <button onclick="view('profile')">Profile</button>
    <button onclick="view('feed')">Feed</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div id="home">
      <div class="card">
        <h2>Velkommen 👋</h2>
        <p id="userInfo"></p>
      </div>
    </div>

    <div id="profile" class="hidden">
      <div class="card">
        <h3>Profil</h3>
        <p>Din konto er aktiv i systemet.</p>
      </div>
    </div>

    <div id="feed" class="hidden">

      <div class="card">
        <h3>Ny post</h3>
        <textarea id="postText" placeholder="Skriv noget..."></textarea>
        <button class="primary" onclick="addPost()">Post</button>
      </div>

      <div id="posts"></div>

    </div>

  </div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 Firebase config */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  appId: "YOUR_APP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = () => signOut(auth);

/* STATE */
onAuthStateChanged(auth, user => {
  if(user){
    login.style.display="none";
    appDiv.classList.remove("hidden");

    userInfo.innerText = "Logget ind som: " + user.email;
  } else {
    login.style.display="flex";
    appDiv.classList.add("hidden");
  }
});

const appDiv = document.getElementById("app");

</script>

<script>

/* NAV */
function view(id){
  document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* POSTS (local only simple demo) */
function addPost(){
  let text = postText.value;
  if(!text) return;

  let div = document.createElement("div");
  div.className="card";
  div.innerText = text;

  posts.prepend(div);
  postText.value="";
}

</script>

</body>
</html>
