<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Chat + Profiles</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

/* LOGIN */
#login {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
}

.box {
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary { background:#2563eb; color:white; }

/* APP */
#app { display:none; }

header {
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
  align-items:center;
}

/* CHAT */
#chatBox {
  height:420px;
  overflow-y:auto;
  background:#1f2937;
  padding:10px;
  border-radius:12px;
}

.msg {
  display:flex;
  gap:10px;
  padding:8px;
  margin:6px 0;
  background:#111827;
  border-radius:10px;
}

.avatar {
  width:32px;
  height:32px;
  border-radius:50%;
  background:#2563eb;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

.meta {
  font-size:12px;
  color:#9ca3af;
}

.onlineDot {
  width:10px;
  height:10px;
  background:lime;
  border-radius:50%;
  display:inline-block;
  margin-left:6px;
}

/* INPUT */
#msgInput {
  width:80%;
  padding:10px;
  border-radius:8px;
  border:none;
}

.sendBtn {
  width:18%;
}

/* PROFILE BOX */
.profileSetup {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.8);
}

.profileCard {
  background:#111827;
  padding:20px;
  border-radius:12px;
  width:300px;
}

.tag {
  font-size:11px;
  padding:2px 6px;
  border-radius:6px;
  background:#4f46e5;
  margin-left:6px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="box">
    <h3>Login</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- PROFILE SETUP -->
<div class="profileSetup" id="profileSetup">
  <div class="profileCard">
    <h3>Opret profil</h3>

    <input id="username" placeholder="Username">
    <input id="avatar" placeholder="Avatar emoji (fx 😎)">
    
    <button class="primary" onclick="saveProfile()">Gem profil</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
  <div>🌍 Global Chat</div>
  <button onclick="logout()">Logout</button>
</header>

<div style="padding:15px">

<div id="chatBox"></div>

<br>

<input id="msgInput" placeholder="Skriv besked...">
<button class="primary sendBtn" onclick="sendMsg()">Send</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  doc,
  setDoc,
  getDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = () => signOut(auth);

/* PROFILE SAVE */
window.saveProfile = async function(){
  let user = auth.currentUser;

  await setDoc(doc(db,"profiles",user.uid), {
    username: username.value,
    avatar: avatar.value || "🙂",
    tag: "user",
    online: true
  });

  profileSetup.style.display="none";
};

/* SEND MESSAGE */
window.sendMsg = async function(){
  let user = auth.currentUser;
  if(!user) return;

  let prof = await getDoc(doc(db,"profiles",user.uid));

  if(!msgInput.value) return;

  await addDoc(collection(db,"messages"), {
    text: msgInput.value,
    uid: user.uid,
    username: prof.data().username,
    avatar: prof.data().avatar,
    tag: prof.data().tag,
    time: serverTimestamp()
  });

  msgInput.value="";
};

/* REALTIME CHAT */
const q = query(collection(db,"messages"), orderBy("time"));

onSnapshot(q, snap=>{
  chatBox.innerHTML="";

  snap.forEach(d=>{
    let m = d.data();

    chatBox.innerHTML += `
      <div class="msg">
        <div class="avatar">${m.avatar}</div>

        <div>
          <b>${m.username}
            <span class="tag">${m.tag}</span>
            <span class="onlineDot"></span>
          </b>
          <div>${m.text}</div>
        </div>
      </div>
    `;
  });

  chatBox.scrollTop = chatBox.scrollHeight;
});

/* AUTH STATE */
onAuthStateChanged(auth, async user => {
  if(user){
    login.style.display="none";
    app.style.display="block";

    let profRef = doc(db,"profiles",user.uid);
    let profSnap = await getDoc(profRef);

    if(!profSnap.exists()){
      profileSetup.style.display="flex";
    }
  } else {
    login.style.display="flex";
    app.style.display="none";
  }
});

</script>

</body>
</html>
