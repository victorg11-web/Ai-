<!DOCTYPE html>\n<html lang=\"da\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n<title>MiniTube Ultra</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n:root{--bg:#0b0f19;--panel:#121a2a;--card:#162033;--text:#e8eefc;--muted:#93a4c7;--accent:#ff3b3b;--accent2:#4f7cff;}body.light{--bg:#f5f7fb;--panel:#fff;--card:#f0f3f9;--text:#0b1220;--muted:#51607a}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial;background:var(--bg);color:var(--text)}header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--panel);position:sticky;top:0;z-index:10}.logo{font-weight:800;color:var(--accent);display:flex;gap:10px;align-items:center}.search{width:40%;padding:10px 14px;border-radius:999px;border:none;background:var(--card);color:var(--text)}.layout{display:flex}.sidebar{width:220px;background:var(--panel);padding:14px;min-height:100vh}.sidebar p{color:var(--muted);cursor:pointer;padding:10px;border-radius:10px}.sidebar p:hover{background:var(--card);color:var(--text)}.main{flex:1;padding:16px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.card{background:var(--card);border-radius:16px;overflow:hidden;cursor:pointer;transition:.2s}.card:hover{transform:translateY(-4px)}.thumb{height:140px;background-size:cover;background-position:center}.card-content{padding:10px}.title{font-weight:600;margin:0}.small{font-size:12px;color:var(--muted)}.badge{font-size:11px;background:var(--accent);padding:2px 6px;border-radius:6px;margin-left:6px}.player,.channelPage{display:none;padding:20px}iframe{width:100%;height:420px;border-radius:14px;border:none}.meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}.likebtn{padding:8px 12px;border:none;border-radius:10px;cursor:pointer;background:var(--card)}.profileBtn{cursor:pointer;color:var(--accent2)}.commentBox{margin-top:12px;background:var(--card);padding:10px;border-radius:12px}.comment{margin-left:10px;padding-left:10px;border-left:2px solid var(--accent2)}input{padding:8px;border-radius:8px;border:none;background:var(--card);color:var(--text)}button{cursor:pointer}</style>\n</head>\n<body>\n<header><div class=\"logo\">▶ MiniTube Ultra</div><input class=\"search\" oninput=\"search(this.value)\" placeholder=\"Søg...\" /><button onclick=\"toggleTheme()\">🌙</button></header>\n<div class=\"layout\"><div class=\"sidebar\"><p onclick=\"render(videos)\">🏠 Home</p><p onclick=\"showTrending()\">🔥 Trending</p></div><div class=\"main\"><div id=\"grid\" class=\"grid\"></div></div></div>\n<div id=\"player\" class=\"player\"><button onclick=\"back()\">⬅ Tilbage</button><iframe id=\"frame\"></iframe><div class=\"meta\"><div><h3 id=\"ptitle\"></h3><div class=\"small profileBtn\" onclick=\"openChannel(current.channel)\">👤 <span id=\"pchannel\"></span></div></div><button class=\"likebtn\" onclick=\"like()\">👍 <span id=\"likes\">0</span></button></div><div class=\"commentBox\"><h4>💬 Comments</h4><input id=\"cinput\" placeholder=\"Skriv kommentar\" /><button onclick=\"addComment()\">Send</button><div id=\"comments\"></div></div></div>\n<div id=\"channelPage\" class=\"channelPage\"><button onclick=\"closeChannel()\">⬅ Back</button><h2 id=\"channelName\"></h2><div id=\"channelVideos\" class=\"grid\"></div></div>\n<script>let videos=JSON.parse(localStorage.getItem(\"videos\")||\"[]\");if(videos.length===0){videos=[{id:\"dQw4w9WgXcQ\",title:\"Gaming Highlights\",channel:\"Alex\",likes:10,views:200,comments:[]},{id:\"5qap5aO4i9A\",title:\"LoFi Music\",channel:\"Mia\",likes:5,views:500,comments:[]}]}let current=null;let user=prompt(\"Brugernavn?\")||\"Guest\";function save(){localStorage.setItem(\"videos\",JSON.stringify(videos));}function thumb(id){return \`https://img.youtube.com/vi/${id}/hqdefault.jpg\`}function recAlgo(l){return[...l].sort((a,b)=>(b.views+b.likes*2)-(a.views+a.likes*2))}function render(l=videos){l=recAlgo(l);grid.innerHTML=l.map(v=>\`<div class='card' onclick=\"openV('${v.id}')\"><div class='thumb' style=\"background-image:url('${thumb(v.id)}')\"></div><div class='card-content'><p class='title'>${v.title}</p><div class='small'>👤 ${v.channel}</div></div></div>\`).join(\"\");}function openV(id){current=videos.find(v=>v.id===id);current.views++;save();document.querySelector('.layout').style.display='none';player.style.display='block';frame.src='https://www.youtube.com/embed/'+id;ptitle.innerText=current.title;pchannel.innerText=current.channel;likes.innerText=current.likes;renderComments();}function back(){document.querySelector('.layout').style.display='flex';player.style.display='none';}function like(){current.likes++;save();likes.innerText=current.likes;}function openChannel(n){channelPage.style.display='block';document.querySelector('.layout').style.display='none';player.style.display='none';channelName.innerText=n;channelVideos.innerHTML=videos.filter(v=>v.channel===n).map(v=>\`<div class='card' onclick=\"openV('${v.id}')\"><div class='thumb' style=\"background-image:url('${thumb(v.id)}')\"></div><div class='card-content'><p class='title'>${v.title}</p></div></div>\`).join(\"\");}function closeChannel(){channelPage.style.display='none';document.querySelector('.layout').style.display='flex';}function addComment(){let t=cinput.value;if(!t)return;current.comments.push({user,text:t,replies:[]});cinput.value='';save();renderComments();}function reply(i){let r=prompt('Reply');if(!r)return;current.comments[i].replies.push({user,text:r});save();renderComments();}function renderComments(){comments.innerHTML=current.comments.map((c,i)=>\`<div class='comment'><b>${c.user}</b>: ${c.text}<button onclick=\"reply(${i})\">reply</button><div style='margin-left:10px'>${c.replies.map(r=>\`↳ <b>${r.user}</b>: ${r.text}\`).join('<br>')}</div></div>\`).join('<br>');}function search(q){render(videos.filter(v=>v.title.toLowerCase().includes(q.toLowerCase())));}function showTrending(){render(videos);}function toggleTheme(){document.body.classList.toggle('light');}render();</script>\n</body>\n</html>
