<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Ultra AI Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

/* GLASS UI */
.chat {
  width: 420px;
  height: 650px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-weight: bold;
  background: rgba(255,255,255,0.05);
}

/* MESSAGES */
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 8px;
  padding: 10px 14px;
  border-radius: 18px;
  max-width: 75%;
  animation: pop 0.2s ease;
}

@keyframes pop {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.user {
  background: #4f7cff;
  margin-left: auto;
}

.ai {
  background: rgba(255,255,255,0.15);
}

/* INPUT */
.inputBox {
  display: flex;
  padding: 10px;
  gap: 5px;
  background: rgba(255,255,255,0.05);
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 12px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: #4f7cff;
  color: white;
}

/* typing dots */
.dots {
  display: inline-block;
}

.dots span {
  animation: blink 1s infinite;
}

.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%,100% { opacity: 0.2; }
  50% { opacity: 1; }
}
</style>
</head>

<body>

<div class="chat">

  <div class="header">🤖 Ultra AI ChatGPT</div>

  <div id="messages" class="messages"></div>

  <div class="inputBox">
    <input id="input" placeholder="Skriv noget..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>

const API_KEY = "DIN_API_KEY_HER"; // 🔑 indsæt din key her

const messagesDiv = document.getElementById("messages");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "msg ai";
  div.id = "typing";
  div.innerHTML = `
    AI skriver <span class="dots">
      <span>.</span><span>.</span><span>.</span>
    </span>
  `;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function send() {
  const input = document.getElementById("input").value;
  if (!input) return;

  addMsg(input, "user");
  document.getElementById("input").value = "";

  addTyping();

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + API_KEY
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "system", content: "Du er en super hjælpsom, venlig dansk AI." },
        { role: "user", content: input }
      ]
    })
  });

  const data = await res.json();
  removeTyping();

  const reply = data.choices[0].message.content;
  addMsg(reply, "ai");
}

</script>

</body>
</html>
