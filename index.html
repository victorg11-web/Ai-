<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

/* LOGIN */
#loginScreen {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #1e293b, #0b1220);
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:16px;
  width:300px;
  backdrop-filter: blur(10px);
}

input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.primary { background:#4f46e5; color:white; }
.danger { background:#ef4444; color:white; }

/* APP */
.hidden { display:none; }

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111827;
  align-items:center;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.tile {
  background:#1f2937;
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  transition:0.2s;
}

.tile:hover {
  transform:scale(1.05);
}

/* MODALS / GAMES */
.screen {
  padding:20px;
}

canvas {
  background:white;
  border-radius:10px;
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="card">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="primary" onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <h3>🎮 Game Hub</h3>
  <button class="danger" onclick="logout()">Logout</button>
</header>

<div class="grid">

  <div class="tile" onclick="showGame('snake')">🐍 Snake</div>
  <div class="tile" onclick="showGame('pong')">🏓 Pong</div>
  <div class="tile" onclick="showGame('profile')">👤 Profile</div>

</div>

<!-- SNAKE -->
<div id="snake" class="screen hidden">
  <h2>Snake</h2>
  <p>Score: <span id="score">0</span></p>
  <canvas id="snakeCanvas" width="300" height="300"></canvas>
</div>

<!-- PONG -->
<div id="pong" class="screen hidden">
  <h2>Pong</h2>
  <canvas id="pongCanvas" width="300" height="300"></canvas>
</div>

<!-- PROFILE -->
<div id="profile" class="screen hidden">
  <h2>Profile</h2>
  <p id="userInfo"></p>
</div>

</div>

<script type="module">

/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 PUT YOUR CONFIG HERE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ================= AUTH ================= */

window.signup = () => {
  createUserWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.login = () => {
  signInWithEmailAndPassword(auth, email.value, password.value)
    .catch(e => alert(e.message));
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if(user){
    loginScreen.classList.add("hidden");
    app.classList.remove("hidden");

    userInfo.innerText = "Logged in: " + user.email;
  } else {
    loginScreen.classList.remove("hidden");
    app.classList.add("hidden");
  }
});

</script>

<script>

/* ================= NAV ================= */
function showGame(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

/* ================= SNAKE ================= */

let s=document.getElementById("snakeCanvas");
let ctx=s.getContext("2d");

let snake=[{x:150,y:150}];
let dx=10,dy=0;
let food={x:100,y:100};
let score=0;

function snakeLoop(){
  requestAnimationFrame(snakeLoop);

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,300,300);

  let head={x:snake[0].x+dx,y:snake[0].y+dy};
  snake.unshift(head);

  if(head.x==food.x && head.y==food.y){
    food={x:(Math.random()*28|0)*10,y:(Math.random()*28|0)*10};
    score++;
    document.getElementById("score").innerText=score;
  } else snake.pop();

  ctx.fillStyle="#4f46e5";
  snake.forEach(p=>ctx.fillRect(p.x,p.y,10,10));

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,10,10);
}
snakeLoop();

document.addEventListener("keydown",e=>{
  if(e.key=="ArrowUp"){dx=0;dy=-10;}
  if(e.key=="ArrowDown"){dx=0;dy=10;}
  if(e.key=="ArrowLeft"){dx=-10;dy=0;}
  if(e.key=="ArrowRight"){dx=10;dy=0;}
});

/* ================= PONG ================= */

let p=document.getElementById("pongCanvas");
let pctx=p.getContext("2d");

let ball={x:150,y:150,dx:3,dy:3};
let paddle=120;

function pong(){
  requestAnimationFrame(pong);

  pctx.fillStyle="#fff";
  pctx.fillRect(0,0,300,300);

  ball.x+=ball.dx;
  ball.y+=ball.dy;

  if(ball.x<0||ball.x>300) ball.dx*=-1;
  if(ball.y<0) ball.dy*=-1;

  if(ball.y>280 && ball.x>paddle && ball.x<paddle+60){
    ball.dy*=-1;
  }

  pctx.fillStyle="#111827";
  pctx.fillRect(paddle,290,60,10);

  pctx.fillStyle="blue";
  pctx.fillRect(ball.x,ball.y,10,10);
}
pong();

document.addEventListener("mousemove",e=>{
  paddle=e.clientX;
});

</script>

</body>
</html>
