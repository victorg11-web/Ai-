<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clicker Spil</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 600px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #score {
      font-size: 2.5rem;
      margin: 20px 0;
    }

    #clickBtn {
      padding: 20px 40px;
      font-size: 1.5rem;
      border: none;
      border-radius: 15px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      transition: transform 0.1s;
    }

    #clickBtn:active {
      transform: scale(0.95);
    }

    .shop {
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      align-items: center;
    }

    button.upgrade {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    .float {
      position: absolute;
      color: #22c55e;
      font-weight: bold;
      animation: floatUp 1s ease-out forwards;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }

    .small {
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🔥 Clicker Spil 🔥</h1>
  <div id="score">0</div>
  <button id="clickBtn">Klik mig!</button>

  <div class="shop">
    <h2>Shop</h2>

    <div class="item">
      <span>+1 per klik</span>
      <button class="upgrade" onclick="buyClickPower()">Køb (<span id="clickCost">10</span>)</button>
    </div>

    <div class="item">
      <span>Auto klik</span>
      <button class="upgrade" onclick="buyAutoClick()">Køb (<span id="autoCost">25</span>)</button>
    </div>

    <div class="item">
      <span>Prestige reset (x2 boost)</span>
      <button class="upgrade" onclick="prestige()">Prestige</button>
    </div>

    <p class="small">Auto-save aktiv</p>
  </div>
</div>

<script>
let score = 0;
let clickPower = 1;
let clickCost = 10;
let autoClickCost = 25;
let autoClickers = 0;
let multiplier = 1;

const scoreEl = document.getElementById("score");
const clickBtn = document.getElementById("clickBtn");

function update() {
  scoreEl.innerText = Math.floor(score);
  document.getElementById("clickCost").innerText = clickCost;
  document.getElementById("autoCost").innerText = autoClickCost;
}

function addScore(amount, x, y) {
  score += amount * multiplier;
  update();

  if (x && y) {
    const float = document.createElement("div");
    float.className = "float";
    float.innerText = "+" + Math.floor(amount * multiplier);
    float.style.left = x + "px";
    float.style.top = y + "px";
    document.body.appendChild(float);

    setTimeout(() => float.remove(), 1000);
  }
}

clickBtn.addEventListener("click", (e) => {
  addScore(clickPower, e.clientX, e.clientY);
});

function buyClickPower() {
  if (score >= clickCost) {
    score -= clickCost;
    clickPower += 1;
    clickCost = Math.floor(clickCost * 1.5);
    update();
  }
}
