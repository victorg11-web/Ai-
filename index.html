<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile System (Offline)</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
}

/* TOP BAR */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111827;
  position:sticky;
  top:0;
}

.badge{
  background:#4f46e5;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
}

/* LAYOUT */
.container{padding:20px;}

.card{
  background:#111827;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.primary{background:#2563eb;color:white;}

/* PROFILE */
.profile{display:none;}

.levelBar{
  height:10px;
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
}

.levelFill{
  height:100%;
  background:#22c55e;
  width:0%;
}

/* CHAT */
#chatBox{
  height:250px;
  overflow:auto;
  background:#1f2937;
  padding:10px;
  border-radius:10px;
}

.msg{
  padding:6px;
  margin:5px 0;
  background:#111827;
  border-radius:8px;
}

.tag{
  font-size:11px;
  background:#4f46e5;
  padding:2px 6px;
  border-radius:6px;
  margin-left:5px;
}

</style>
</head>

<body>

<header>
  <div>Profile App</div>
  <div>
    <span id="topName">Guest</span>
    <span class="badge">Lv <span id="topLevel">0</span></span>
  </div>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h3>Login / Opret</h3>

    <input id="username" placeholder="Username">
    <input id="avatar" placeholder="Avatar emoji (🙂)">

    <button class="primary" onclick="login()">Enter</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profile" class="profile">

  <div class="card">
    <h3>Profil</h3>

    <p>Navn: <span id="pName"></span></p>
    <p>Avatar: <span id="pAvatar"></span></p>
    <p>Tag: <span id="pTag"></span></p>

    <div class="levelBar">
      <div class="levelFill" id="levelFill"></div>
    </div>

    <p>Level: <span id="pLevel"></span></p>
  </div>

  <div class="card">
    <h3>Chat Tags</h3>

    <select id="tagSelect">
      <option value="user">User</option>
      <option value="pro">Pro (lvl 3)</option>
      <option value="elite">Elite (lvl 5)</option>
    </select>

    <button class="primary" onclick="saveTag()">Gem Tag</button>
  </div>

  <div class="card">
    <h3>Chat (local demo)</h3>

    <div id="chatBox"></div>

    <input id="msg" placeholder="Skriv besked">
    <button class="primary" onclick="sendMsg()">Send</button>
  </div>

</div>

</div>

<script>

/* ===== LOCAL PROFILE SYSTEM ===== */

let profile = JSON.parse(localStorage.getItem("profile")) || null;

/* LOGIN */
function login(){

  if(!username.value) return alert("skriv username");

  if(!profile){
    profile = {
      name: username.value,
      avatar: avatar.value || "🙂",
      level: 1,
      xp: 0,
      tag: "user",
      messages: []
    };
  }

  save();
  show();
}

/* SAVE */
function save(){
  localStorage.setItem("profile", JSON.stringify(profile));
}

/* SHOW UI */
function show(){

  login.style.display="none";
  profileEl.style.display="block";

  pName.innerText = profile.name;
  pAvatar.innerText = profile.avatar;
  pTag.innerHTML = `<span class="tag">${profile.tag}</span>`;
  pLevel.innerText = profile.level;

  topName.innerText = profile.name;
  topLevel.innerText = profile.level;

  levelFill.style.width = (profile.xp % 100) + "%";

  renderChat();
}

/* TAG SYSTEM */
function saveTag(){

  if(tagSelect.value=="pro" && profile.level < 3){
    alert("Locked level 3");
    return;
  }

  if(tagSelect.value=="elite" && profile.level < 5){
    alert("Locked level 5");
    return;
  }

  profile.tag = tagSelect.value;
  save();
  show();
}

/* CHAT */
function sendMsg(){

  if(!msg.value) return;

  profile.messages.push({
    text: msg.value,
    name: profile.name,
    avatar: profile.avatar,
    tag: profile.tag
  });

  profile.xp += 10;
  profile.level = Math.floor(profile.xp / 100) + 1;

  save();
  renderChat();
  show();

  msg.value="";
}

function renderChat(){

  chatBox.innerHTML="";

  profile.messages.forEach(m=>{
    chatBox.innerHTML += `
      <div class="msg">
        ${m.avatar} <b>${m.name}</b>
        <span class="tag">${m.tag}</span><br>
        ${m.text}
      </div>
    `;
  });

}

/* INIT */
if(profile){
  show();
}

</script>

</body>
</html>
