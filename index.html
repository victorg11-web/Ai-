<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Arcade Hub</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: #00ffcc;
  background: black;
  overflow-x: hidden;
}

/* MATRIX CANVAS */
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #00ffcc;
  background: rgba(0,0,0,0.7);
}

nav button {
  margin: 3px;
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  padding: 6px 10px;
  cursor: pointer;
}

nav button:hover {
  background: #00ffcc;
  color: black;
}

/* SECTIONS */
section { display:none; padding:20px; }
.active { display:block; }

/* CHAT */
#chatBox {
  border: 1px solid #00ffcc;
  height: 200px;
  overflow-y: auto;
  padding: 10px;
  margin-bottom: 10px;
}

/* CANVAS */
canvas.game {
  border: 2px solid #00ffcc;
  display:block;
  margin:10px auto;
}

/* BUTTONS */
button {
  cursor:pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>
  <h2>⚡ CYBER ARCADE</h2>
  <nav>
    <button onclick="show('home')">Home</button>
    <button onclick="show('snake')">Snake</button>
    <button onclick="show('pong')">Pong</button>
    <button onclick="show('chat')">AI</button>
    <button onclick="toggleMusic()">🎵</button>
  </nav>
</header>

<!-- HOME -->
<section id="home" class="active">
  <h2>🏠 Dashboard</h2>
  <p>Velkommen til Cyber Arcade Hub</p>

  <h3>🏆 Achievements</h3>
  <div id="achievements"></div>
</section>

<!-- SNAKE -->
<section id="snake">
  <h2>🐍 Snake</h2>
  <canvas id="snakeCanvas" width="300" height="300" class="game"></canvas>
</section>

<!-- PONG -->
<section id="pong">
  <h2>🏓 Pong</h2>
  <canvas id="pongCanvas" width="300" height="300" class="game"></canvas>
</section>

<!-- CHAT BOT -->
<section id="chat">
  <h2>🧠 Cyber AI</h2>
  <div id="chatBox"></div>
  <input id="input" placeholder="skriv noget..." />
  <button onclick="sendMsg()">Send</button>
</section>

<script>

/* ================= MATRIX BACKGROUND ================= */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01CYBERHACKER0101".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ffcc";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, y*fontSize);

    if (y*fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}
setInterval(drawMatrix, 40);

/* ================= NAV ================= */
function show(id) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* ================= SOUND SYSTEM ================= */
let musicOn = false;
let audioCtx;

function toggleMusic() {
  if (!audioCtx) audioCtx = new AudioContext();
  musicOn = !musicOn;
}

function beep(freq=400) {
  if (!audioCtx || !musicOn) return;

  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = "square";
  o.frequency.value = freq;

  g.gain.value = 0.05;

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + 0.1);
}

/* ================= ACHIEVEMENTS ================= */
let achievements = JSON.parse(localStorage.getItem("ach")) || [];

function addAch(text) {
  if (!achievements.includes(text)) {
    achievements.push(text);
    localStorage.setItem("ach", JSON.stringify(achievements));
    renderAch();
  }
}

function renderAch() {
  document.getElementById("achievements").innerHTML =
    achievements.map(a => "🏆 " + a).join("<br>");
}
renderAch();

/* ================= CHAT BOT ================= */
function sendMsg() {
  let input = document.getElementById("input");
  let box = document.getElementById("chatBox");

  let msg = input.value;
  box.innerHTML += "<div>You: " + msg + "</div>";

  let reply = "Jeg forstår ikke helt 🤖";
  if (msg.includes("hej")) reply = "Hej hacker 😎";
  if (msg.includes("snake")) reply = "Snake er i menuen 🐍";
  if (msg.includes("pong")) reply = "Ping pong mode aktiveret 🏓";

  box.innerHTML += "<div>AI: " + reply + "</div>";
  input.value = "";

  beep(600);
}

/* ================= SNAKE ================= */
const s = document.getElementById("snakeCanvas");
const sctx = s.getContext("2d");

let snake = [{x:150,y:150}];
let dx = 10, dy = 0;
let food = {x:50,y:50};

function snakeGame() {
  requestAnimationFrame(snakeGame);

  sctx.fillStyle="black";
  sctx.fillRect(0,0,300,300);

  let head = {x:snake[0].x+dx, y:snake[0].y+dy};

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    food.x=Math.random()*280|0;
    food.y=Math.random()*280|0;
    addAch("Spiste food i Snake");
    beep(800);
  } else snake.pop();

  sctx.fillStyle="#00ffcc";
  snake.forEach(p=>sctx.fillRect(p.x,p.y,10,10));

  sctx.fillStyle="#ff00ff";
  sctx.fillRect(food.x,food.y,10,10);
}
snakeGame();

document.addEventListener("keydown",e=>{
  if(e.key=="ArrowUp") {dx=0;dy=-10;}
  if(e.key=="ArrowDown") {dx=0;dy=10;}
  if(e.key=="ArrowLeft") {dx=-10;dy=0;}
  if(e.key=="ArrowRight") {dx=10;dy=0;}
});

/* ================= PONG ================= */
const p = document.getElementById("pongCanvas");
const pctx = p.getContext("2d");

let ball = {x:150,y:150,dx:3,dy:3};
let paddle = 120;

function pong() {
  requestAnimationFrame(pong);

  pctx.fillStyle="black";
  pctx.fillRect(0,0,300,300);

  ball.x+=ball.dx;
  ball.y+=ball.dy;

  if(ball.x<0||ball.x>300) ball.dx*=-1;
  if(ball.y<0) ball.dy*=-1;

  if(ball.y>280 && ball.x>paddle && ball.x<paddle+60) {
    ball.dy*=-1;
    beep(300);
  }

  pctx.fillStyle="#00ffcc";
  pctx.fillRect(paddle,290,60,10);

  pctx.fillRect(ball.x,ball.y,10,10);
}
pong();

document.addEventListener("mousemove",e=>{
  paddle = e.clientX;
});

</script>

</body>
</html>
